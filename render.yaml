services:
  - type: web
    name: acopio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: /bin/sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: acopio-db
          property: connectionString

databases:
  - name: acopio-db
    plan: free
